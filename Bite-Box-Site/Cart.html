<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BiteBox Carts</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap");
    </style>
    <script
      src="https://kit.fontawesome.com/8553b64424.js"
      crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="./Cart.css">
  </head>
<body>
    <header>
      <nav>
        <div>
          <!-- This is logo section -->
          <!-- <h2>Bite<span style="color: red">Box</span></h2> -->
          <img src="./Images/logo_bb.png" width="150px" height="60px" alt="" />
        </div>
        <!-- Menu -->
        <ul type="none">
          <li><a href="./index.html" target="_blank">Home</a></li>
          <li><a href="./Menu.html" target="_blank">Menu</a></li>
          <li><a href="./bitedeals.html" target="_blank">Bite Deals</a></li>
          <li>
            <a href="./Cart.html" target="_blank">
              <i class="fa-solid fa-cart-plus"></i> Cart
            </a>
          </li>
          <li>
            <a href="./Login.html" target="_blank"><button id="login-button">
              <i class="fa-solid fa-right-to-bracket"></i> Login</button>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- Cart Table -->
     <section class="cart">
      <table>
        <thead>
          <th>Item</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Remove</th>
        </thead>
        <tbody>
          <tr>
            <td class="item">
              <img src="./Images/Burger.jpg" alt="">
              <div>
                <h4>Cheesy Burger</h4>
                <p>Cheesy Grilled Burger</p>
              </div>
            </td>
            <td>₹189</td>
            <td>
              <div class="quantity-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
            </td>
            <td>₹189</td>
            <td><button class="remove">X</button></td>
          </tr>
          <tr>
            <td class="item">
              <img src="./Images/Red-Sause-Pasta.jpg" alt="">
              <div>
                <h4>Pasta</h4>
                <p>Red Sausce Pasta</p>
              </div>
            </td>
            <td>₹199</td>
            <td>
              <div class="quantity-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
            </td>
            <td>₹199</td>
            <td><button class="remove">X</button></td>
          </tr>
          <tr>
            <td class="item">
              <img src="./Images/capsicum_pizza.avif" alt="">
              <div>
                <h4>Capsicum pizza</h4>
                <p>Cheesy pizza</p>
              </div>
            </td>
            <td>₹169</td>
            <td>
              <div class="quantity-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
              </div>
            </td>
            <td>₹169</td>
            <td><button class="remove">X</button></td>
          </tr>
          <tr class="grand_total">
            <td colspan="3">Grand Total</td>
            <td>₹577</td>
            <td><button>Proceed</button></td>
          </tr>
        </tbody>
      </table>
     </section>
</body>
</html>
