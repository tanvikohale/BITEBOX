<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video and Audio</title>
  </head>
  <body>
    <!-- <video src="./Images/galaxy.mp4" controls autoplay loop></video> -->
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/A9COIXa8E2w?si=LBAING5_2WsilWmU"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>

    <audio src="./Images/audio.mp3" controls></audio>
  </body>
</html>
