<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Tags</title>
</head>
<body>
    <h3>Ordered List</h3>
    <ol start="1"> 
        <li>Soniya</li>
        <li>Shruti</li>
        <li>Astha</li>
        <li>Aachal</li>
    </ol>

    <h3>Unordered list</h3>
    <ul type="square">
        <li>Red</li>
        <li>Blue</li>
        <li>Green</li>
        <li>Yellow</li>
    </ul>

    <h3>Discription list</h3>
    <dt>Term-1</dt>
    <dd>This is evaluation I which includes java and c++ technologies</dd>
</body>
</html>
